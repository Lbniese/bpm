name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:
    inputs:
      informational_baseline:
        description: Allow cross-machine or version-mismatched baseline comparisons as informational only
        required: false
        default: false
        type: boolean
      regression_envelope:
        description: Maximum allowed current/baseline median ratio
        required: false
        default: '2.0'
        type: string

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: fmt, clippy, test, build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build --release
        run: cargo build --release --workspace

  benchmark-smoke:
    name: benchmark harness smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run -- bench --list
      - run: cargo test --test bench

  benchmark-baseline:
    name: benchmark baseline regression
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '26.0.0'
      - name: Install pnpm
        run: npm install --global pnpm@10.13.1
      - name: Verify pinned tool versions
        run: |
          node --version
          npm --version
          pnpm --version
      - name: Run strict benchmark and compare semantic baseline
        shell: bash
        run: |
          extra_flags=()
          if [[ "${{ github.event.inputs.informational_baseline }}" == "true" ]]; then
            extra_flags+=(--baseline-informational)
          fi

          cargo run --release -- bench \
            --fixture minimal \
            --scenario repeat_install \
            --tools npm,pnpm,bpm \
            --require-tools \
            --runs 3 \
            --json /tmp/current.json \
            --compare-baseline benchmarks/baselines/reference.json \
            --regression-envelope "${{ github.event.inputs.regression_envelope || '2.0' }}" \
            ${extra_flags[@]}
