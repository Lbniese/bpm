name: release

# Builds pre-built bpm binaries and attaches them to the GitHub Release
# created by pushing a `v*` tag. Assets are named:
#   bpm-<rust-target>.tar.gz     (contains a single `bpm` binary)
# These match what install.sh expects to download.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            use_cross: false
          - target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (release)
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package tarball
        run: |
          staging="staging/${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/bpm" "$staging/bpm"
          tar -C "staging/${{ matrix.target }}" -czf "bpm-${{ matrix.target }}.tar.gz" bpm

      - name: Upload to release
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tolerate a concurrent "create" from sibling matrix jobs: the first
          # job to run creates the release; the rest get HTTP 422 (already
          # exists), which we ignore, then everyone uploads their own asset.
          gh release create "$TAG" --title "$TAG" --generate-notes 2>/dev/null || true
          gh release upload "$TAG" "bpm-${{ matrix.target }}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
