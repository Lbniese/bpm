# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
# CI gates on the [advisories] table (known RUSTSEC vulnerabilities). The
# [licenses]/[bans]/[sources] tables are present for local use and as an
# optional stretch gate; they are not a hard CI gate yet.

[advisories]
# Gate CI on real security vulnerabilities.  In cargo-deny 0.20+,
# `vulnerability`/`unsound`/`notice`/`severity-threshold` have been removed:
# vulnerabilities and unsound advisories always fail.  The remaining options
# control scope for unmaintained and severity for yanked.
yanked = "warn"
unmaintained = "workspace"

# ── Optional stretch tables (run locally with `cargo deny check`) ───────────

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
